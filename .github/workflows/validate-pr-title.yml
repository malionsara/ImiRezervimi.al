name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-title:
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate PR title format
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            
            console.log(`Validating PR #${prNumber} title: "${prTitle}"`);
            
            // Expected format: [MONDAY_XXXXXXXXXX] Description
            const mondayIdPattern = /^\[MONDAY_\d+\]\s+.+/;
            
            if (mondayIdPattern.test(prTitle)) {
              console.log('✅ PR title format is valid');
              
              // Extract Monday ID for verification
              const mondayIdMatch = prTitle.match(/\[MONDAY_(\d+)\]/);
              const mondayId = mondayIdMatch[1];
              
              // Add success comment (only once)
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              
              const hasValidationComment = comments.some(comment => 
                comment.body.includes('PR Title Validation') && 
                comment.user.type === 'Bot'
              );
              
              if (!hasValidationComment) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `✅ **PR Title Validation - PASSED**