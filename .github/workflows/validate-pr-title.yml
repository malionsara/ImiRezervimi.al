name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-title:
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate PR title format
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            
            console.log(`Validating PR #${prNumber} title: "${prTitle}"`);
            
            // Expected format: [MONDAY_XXXXXXXXXX] Description
            const mondayIdPattern = /^\[MONDAY_\d+\]\s+.+/;
            
            if (mondayIdPattern.test(prTitle)) {
              console.log('✅ PR title format is valid');
              
              // Extract Monday ID for verification
              const mondayIdMatch = prTitle.match(/\[MONDAY_(\d+)\]/);
              const mondayId = mondayIdMatch[1];
              
              // Add success comment (only once)
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              
              const hasValidationComment = comments.some(comment => 
                comment.body.includes('PR Title Validation') && 
                comment.user.type === 'Bot'
              );
              
              if (!hasValidationComment) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `✅ **PR Title Validation - PASSED**
                  
**Monday ID:** \`MONDAY_${mondayId}\`
**Format:** Valid ✅

This PR follows the correct naming convention and will automatically close the corresponding issue when merged.

**Expected behavior on merge:**
- Issue with \`MONDAY_${mondayId}\` in title will be automatically closed
- Issue will be labeled as \`auto-closed\` and \`completed\`
- Monday.com item status will be updated (if configured)

---
🤖 *Automated validation by GitHub Actions*`
                });
              }
              
            } else {
              console.log('❌ PR title format is invalid');
              
              // Add or update failure comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              
              const existingComment = comments.find(comment => 
                comment.body.includes('PR Title Validation') && 
                comment.user.type === 'Bot'
              );
              
              const errorMessage = `❌ **PR Title Validation - FAILED**
              
**Current title:** \`${prTitle}\`
**Required format:** \`[MONDAY_XXXXXXXXXX] Brief description\`

**Examples of valid titles:**
- \`[MONDAY_2048009327] Set up Twilio account and WhatsApp sandbox\`
- \`[MONDAY_2048009328] Implement customer phone verification system\`
- \`[MONDAY_2048009329] Build salon availability calculation engine\`

**Why this matters:**
- Enables automatic issue closing when PR is merged
- Links GitHub issues to Monday.com project management
- Maintains consistent project tracking

**To fix:** Update your PR title to include the Monday ID in square brackets at the beginning.

---
🤖 *Automated validation by GitHub Actions*`;
              
              if (existingComment) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: errorMessage
                });
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: errorMessage
                });
              }
              
              // Fail the check
              core.setFailed(`PR title must follow format: [MONDAY_XXXXXXXXXX] Description`);
            }

      - name: Check for corresponding issue
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            
            // Extract Monday ID
            const mondayIdMatch = prTitle.match(/\[MONDAY_(\d+)\]/);
            if (!mondayIdMatch) return;
            
            const mondayId = mondayIdMatch[1];
            console.log(`Checking for corresponding issue with Monday ID: ${mondayId}`);
            
            try {
              // Search for issues with the Monday ID
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });
              
              const matchingIssue = issues.find(issue => 
                issue.title.includes(`MONDAY_${mondayId}`) && 
                issue.pull_request === undefined
              );
              
              if (matchingIssue) {
                console.log(`✅ Found corresponding issue #${matchingIssue.number}`);
                
                // Add link comment to PR
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `🔗 **Linked Issue Found**
                  
This PR is linked to issue #${matchingIssue.number}:
**"${matchingIssue.title}"**

The issue will be automatically closed when this PR is merged.

---
🤖 *Automated by GitHub Actions*`
                });
                
                // Add link comment to issue
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: matchingIssue.number,
                  body: `🔗 **Pull Request Created**
                  
PR #${prNumber} has been created for this issue:
**"${prTitle}"**

This issue will be automatically closed when the PR is merged.

---
🤖 *Automated by GitHub Actions*`
                });
                
              } else {
                console.log(`⚠️ No corresponding issue found for Monday ID: ${mondayId}`);
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `⚠️ **No Corresponding Issue Found**
                  
No open issue found with Monday ID: \`MONDAY_${mondayId}\`

**Please verify:**
- The issue exists and is open
- The Monday ID matches exactly
- The issue title contains \`MONDAY_${mondayId}\`

**Note:** The auto-close automation will not work without a corresponding issue.

---
🤖 *Automated by GitHub Actions*`
                });
              }
              
            } catch (error) {
              console.error('Error checking for corresponding issue:', error);
            }