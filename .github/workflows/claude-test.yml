name: Claude Test Action

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Print event
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"
          echo "Comment body: '${{ github.event.comment.body }}'"
          echo "Comment ID: ${{ github.event.comment.id }}"
          echo "Issue number: ${{ github.event.issue.number }}"
          echo "Issue title: ${{ github.event.issue.title }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          
      - name: Test comment matching
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          echo "Testing comment: '$COMMENT_BODY'"
          if [[ "$COMMENT_BODY" == "/claude" ]]; then
            echo "✅ Comment matches /claude exactly"
          elif [[ "$COMMENT_BODY" == *"/claude"* ]]; then
            echo "⚠️ Comment contains /claude but not exact match"
          else
            echo "❌ Comment does not match /claude"
          fi