# .github/workflows/send-reminders.yml
# GitHub Actions workflow to send 24-hour appointment reminders
# Runs daily at 9:00 AM Albanian time (UTC+1/+2)

name: Send Appointment Reminders

on:
  schedule:
    # Runs at 8:00 AM UTC (9:00 AM CET/10:00 AM CEST in Albania)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Reminders API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.NEXTAUTH_URL }}/api/appointments/reminders" \
            -w "\nHTTP Status: %{http_code}\n" \
            -s --show-error --fail
        
      - name: Log completion
        run: echo "✅ Reminder job completed at $(date)"