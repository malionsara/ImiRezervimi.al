name: Vercel Deployment & Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  deployment_status:
    # Trigger when Vercel deployment completes

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  wait-for-vercel:
    name: Wait for Vercel Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'deployment_status'
    
    outputs:
      deployment_url: ${{ steps.get-url.outputs.url }}
      deployment_state: ${{ github.event.deployment_status.state }}
      
    steps:
      - name: Extract deployment URL
        id: get-url
        run: |
          echo "Deployment status: ${{ github.event.deployment_status.state }}"
          echo "Environment: ${{ github.event.deployment_status.environment }}"
          echo "URL: ${{ github.event.deployment_status.target_url }}"
          echo "url=${{ github.event.deployment_status.target_url }}" >> $GITHUB_OUTPUT

  test-vercel-deployment:
    name: Test Vercel Deployment
    runs-on: ubuntu-latest
    needs: wait-for-vercel
    if: needs.wait-for-vercel.outputs.deployment_state == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright
        run: npx playwright install chromium
        
      - name: Run deployment health checks
        run: node scripts/test-deployment.js preview
        env:
          VERCEL_PREVIEW_URL: ${{ needs.wait-for-vercel.outputs.deployment_url }}
          
      - name: Test critical user flows on deployment
        run: npx playwright test tests/homepage.spec.ts tests/authentication.spec.ts --project=chromium
        env:
          BASE_URL: ${{ needs.wait-for-vercel.outputs.deployment_url }}
          HEADLESS: true
          
      - name: Upload deployment test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vercel-deployment-test-results
          path: |
            deployment-test-report-*.json
            deployment-test-report-*.md
            playwright-report/
            test-results/
          retention-days: 7
          
      - name: Comment on PR with deployment test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find the latest deployment report
            const files = fs.readdirSync('.');
            const reportFile = files.find(f => f.startsWith('deployment-test-report-') && f.endsWith('.md'));
            
            if (reportFile) {
              const report = fs.readFileSync(reportFile, 'utf8');
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🚀 Vercel Deployment Test Results\n\n**Deployment URL:** ${{ needs.wait-for-vercel.outputs.deployment_url }}\n\n${report}`
              });
            }

  test-production-deployment:
    name: Test Production Deployment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright
        run: npx playwright install chromium
        
      - name: Wait for production deployment
        run: |
          echo "Waiting for production deployment to be ready..."
          timeout 300 bash -c 'until curl -f https://imirezervimi.al/api/health; do sleep 10; done'
          
      - name: Run production health checks
        run: node scripts/test-deployment.js production
        
      - name: Test critical flows on production
        run: npx playwright test tests/homepage.spec.ts tests/authentication.spec.ts --project=chromium
        env:
          BASE_URL: https://imirezervimi.al
          HEADLESS: true
          
      - name: Upload production test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-test-results
          path: |
            deployment-test-report-*.json
            deployment-test-report-*.md
            playwright-report/
            test-results/
          retention-days: 30
          
      - name: Create GitHub issue if production tests fail
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let reportContent = 'Production deployment tests failed.';
            
            // Try to read the deployment report
            const files = fs.readdirSync('.');
            const reportFile = files.find(f => f.startsWith('deployment-test-report-') && f.endsWith('.md'));
            
            if (reportFile) {
              reportContent = fs.readFileSync(reportFile, 'utf8');
            }
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production Deployment Test Failure - ${new Date().toISOString().split('T')[0]}`,
              body: `## 🚨 Production Deployment Test Failure\n\n**Commit:** ${context.sha}\n**Workflow:** ${context.workflow}\n**Run:** ${context.runNumber}\n\n### Test Results\n\n${reportContent}\n\n### Actions Required\n\n1. Review the test results above\n2. Check the workflow logs for detailed error information\n3. Fix any critical issues\n4. Re-run the deployment tests\n\n*This issue was created automatically by the deployment testing workflow.*`,
              labels: ['bug', 'production', 'urgent']
            });

  lighthouse-performance:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: wait-for-vercel
    if: needs.wait-for-vercel.outputs.deployment_state == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli
        
      - name: Run Lighthouse audit
        run: |
          lhci autorun --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true
        
      - name: Run custom Lighthouse audit
        run: |
          npx lighthouse ${{ needs.wait-for-vercel.outputs.deployment_url }} \
            --output=json \
            --output=html \
            --output-path=./lighthouse-results \
            --chrome-flags="--headless" \
            --only-categories=performance,accessibility,best-practices,seo
            
      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: lighthouse-results.*
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: wait-for-vercel
    if: needs.wait-for-vercel.outputs.deployment_state == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run OWASP ZAP security scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ needs.wait-for-vercel.outputs.deployment_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true
        
      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: report_html.html
          retention-days: 7

  accessibility-test:
    name: Accessibility Testing
    runs-on: ubuntu-latest
    needs: wait-for-vercel
    if: needs.wait-for-vercel.outputs.deployment_state == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright
        run: npx playwright install chromium
        
      - name: Run accessibility tests
        run: |
          npx playwright test --config=playwright-a11y.config.ts
        env:
          BASE_URL: ${{ needs.wait-for-vercel.outputs.deployment_url }}
        continue-on-error: true
        
      - name: Upload accessibility test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [test-vercel-deployment, test-production-deployment, lighthouse-performance, security-scan, accessibility-test]
    
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-test-results/
          
      - name: Generate deployment summary
        run: |
          echo "# 🚀 Vercel Deployment Test Summary" > deployment-summary.md
          echo "" >> deployment-summary.md
          echo "**Repository:** ${{ github.repository }}" >> deployment-summary.md
          echo "**Commit:** ${{ github.sha }}" >> deployment-summary.md
          echo "**Branch:** ${{ github.ref_name }}" >> deployment-summary.md
          echo "**Triggered by:** ${{ github.event_name }}" >> deployment-summary.md
          echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> deployment-summary.md
          echo "" >> deployment-summary.md
          
          echo "## Test Results Overview" >> deployment-summary.md
          echo "" >> deployment-summary.md
          
          # Check for test results
          if [ -d "all-test-results/vercel-deployment-test-results" ]; then
            echo "✅ **Vercel Deployment Tests:** Completed" >> deployment-summary.md
          fi
          
          if [ -d "all-test-results/production-test-results" ]; then
            echo "✅ **Production Tests:** Completed" >> deployment-summary.md
          fi
          
          if [ -d "all-test-results/lighthouse-results" ]; then
            echo "⚡ **Performance Audit:** Completed" >> deployment-summary.md
          fi
          
          if [ -d "all-test-results/security-scan-results" ]; then
            echo "🛡️ **Security Scan:** Completed" >> deployment-summary.md
          fi
          
          if [ -d "all-test-results/accessibility-test-results" ]; then
            echo "♿ **Accessibility Tests:** Completed" >> deployment-summary.md
          fi
          
          echo "" >> deployment-summary.md
          echo "## Available Artifacts" >> deployment-summary.md
          echo "All detailed test reports have been uploaded as workflow artifacts." >> deployment-summary.md
          echo "" >> deployment-summary.md
          
          echo "---" >> deployment-summary.md
          echo "*Summary generated automatically by GitHub Actions*" >> deployment-summary.md
          
      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.md
          retention-days: 30