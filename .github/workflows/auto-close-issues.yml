name: Auto-close Issues on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  auto-close-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Monday ID from PR title
        id: extract-monday-id
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"
          
          # Extract Monday ID using regex pattern [MONDAY_XXXXXXXXXX]
          if [[ $PR_TITLE =~ \[MONDAY_([0-9]+)\] ]]; then
            MONDAY_ID="${BASH_REMATCH[1]}"
            echo "Found Monday ID: $MONDAY_ID"
            echo "monday_id=$MONDAY_ID" >> $GITHUB_OUTPUT
            echo "has_monday_id=true" >> $GITHUB_OUTPUT
          else
            echo "No Monday ID found in PR title"
            echo "has_monday_id=false" >> $GITHUB_OUTPUT
          fi

      - name: Find and close corresponding issue
        if: steps.extract-monday-id.outputs.has_monday_id == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const mondayId = '${{ steps.extract-monday-id.outputs.monday_id }}';
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            
            console.log(`Looking for issue with Monday ID: ${mondayId}`);
            
            try {
              // Search for issues with the Monday ID in the title
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });
              
              // Find issue with matching Monday ID
              const matchingIssue = issues.find(issue => 
                issue.title.includes(`MONDAY_${mondayId}`) && 
                issue.pull_request === undefined // Exclude PRs from search
              );
              
              if (matchingIssue) {
                console.log(`Found matching issue #${matchingIssue.number}: ${matchingIssue.title}`);
                
                // Close the issue with a comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: matchingIssue.number,
                  body: `🎉 **Automatically closed by merged PR**
                  
**PR:** #${prNumber} - ${prTitle}
**Monday ID:** MONDAY_${mondayId}
**Merged by:** @${context.payload.pull_request.merged_by.login}
**Merged at:** ${context.payload.pull_request.merged_at}

This issue has been automatically closed because the corresponding pull request was merged successfully.

---
🤖 *Automated by GitHub Actions*`
                });
                
                // Close the issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: matchingIssue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
                
                console.log(`✅ Successfully closed issue #${matchingIssue.number}`);
                
                // Add labels to track automation
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: matchingIssue.number,
                  labels: ['auto-closed', 'completed']
                });
                
              } else {
                console.log(`❌ No matching open issue found for Monday ID: ${mondayId}`);
                
                // Create a comment on the PR to notify
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `⚠️ **Issue Auto-close Warning**
                  
No open issue found with Monday ID: \`MONDAY_${mondayId}\`

Please verify that:
- The issue exists and is open
- The Monday ID in the PR title matches the issue title
- The issue title contains \`MONDAY_${mondayId}\`

---
🤖 *Automated by GitHub Actions*`
                });
              }
              
            } catch (error) {
              console.error('Error in auto-close workflow:', error);
              
              // Create error comment on PR
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `❌ **Auto-close Error**
                
Failed to automatically close issue for Monday ID: \`MONDAY_${mondayId}\`

Error: ${error.message}

Please manually close the corresponding issue.

---
🤖 *Automated by GitHub Actions*`
              });
            }

      - name: Update Monday.com status (optional)
        if: steps.extract-monday-id.outputs.has_monday_id == 'true' && vars.MONDAY_API_TOKEN
        run: |
          MONDAY_ID="${{ steps.extract-monday-id.outputs.monday_id }}"
          echo "Would update Monday.com item $MONDAY_ID to 'Done' status"
          # TODO: Implement Monday.com API integration
          # curl -X POST "https://api.monday.com/v2" \
          #   -H "Authorization: Bearer ${{ vars.MONDAY_API_TOKEN }}" \
          #   -H "Content-Type: application/json" \
          #   -d '{"query": "mutation { change_column_value(item_id: '$MONDAY_ID', board_id: YOUR_BOARD_ID, column_id: \"status\", value: \"{\\\"label\\\":\\\"Done\\\"}\") { id } }"}'

      - name: Summary
        if: always()
        run: |
          echo "🔄 Auto-close Issues Workflow Summary"
          echo "=================================="
          echo "PR: #${{ github.event.pull_request.number }}"
          echo "Title: ${{ github.event.pull_request.title }}"
          echo "Monday ID Found: ${{ steps.extract-monday-id.outputs.has_monday_id }}"
          if [[ "${{ steps.extract-monday-id.outputs.has_monday_id }}" == "true" ]]; then
            echo "Monday ID: MONDAY_${{ steps.extract-monday-id.outputs.monday_id }}"
          fi
          echo "Merged by: ${{ github.event.pull_request.merged_by.login }}"
          echo "=================================="